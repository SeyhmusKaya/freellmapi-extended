server {
    listen 80;
    listen [::]:80;
    server_name myapi.example.com;

    client_max_body_size 25m;

    # API path - Bearer unified key (app-enforced), no Basic Auth (consumers)
    location /v1/ {
        proxy_pass http://127.0.0.1:18789;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Dashboard + /api management - Basic Auth + rate limit
    # (limit_req zone "freellm_auth" declared in sites-enabled/myllm)
    location / {
        auth_basic "MyLLM Restricted";
        auth_basic_user_file /etc/nginx/.myllm_htpasswd;
        limit_req zone=freellm_auth burst=30 nodelay;

        proxy_pass http://127.0.0.1:18789;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
